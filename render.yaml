services:
  - type: web
    name: smartkb-backend
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MODE
        value: local
      - key: MODEL_NAME
        value: qwen2.5:7b
      - key: BASE_URL
        value: http://localhost:11434
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 10
